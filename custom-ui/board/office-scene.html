<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D办公场景看板 - OpenClaw</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        .scene-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #2c3e50;
        }

        #officeCanvas {
            display: block;
            background: linear-gradient(to bottom, #3498db 0%, #ecf0f1 100%);
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            color: white;
            z-index: 10;
        }

        .scene-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            margin-right: 8px;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .agent-tooltip {
            position: absolute;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            z-index: 30;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 40;
        }
    </style>
</head>
<body>
    <div class="scene-container">
        <div class="ui-overlay">
            <h1 class="scene-title">🏢 OpenClaw 3D办公场景</h1>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-value" id="totalAgents">0</span>
                    <span>总Agent</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="activeAgents">0</span>
                    <span>工作中</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="idleAgents">0</span>
                    <span>休息中</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="totalTasks">0</span>
                    <span>待办任务</span>
                </div>
            </div>
        </div>

        <canvas id="officeCanvas"></canvas>
        
        <div class="agent-tooltip" id="agentTooltip"></div>

        <div class="controls">
            <button class="control-btn" onclick="toggleAnimation()">⏯️ 暂停/继续</button>
            <button class="control-btn" onclick="refreshData()">🔄 刷新数据</button>
            <button class="control-btn" onclick="changeView()">📷 切换视角</button>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #e74c3c;"></div>
                <span>工作中 - 高优先级</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #f39c12;"></div>
                <span>工作中 - 普通任务</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #95a5a6;"></div>
                <span>空闲/休息</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #2ecc71;"></div>
                <span>任务完成</span>
            </div>
        </div>

        <div class="loading" id="loading">正在加载办公场景...</div>
    </div>

    <script src="./office-scene.js"></script>
    <script>
        // 页面加载完成后初始化场景
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                new OfficeScene();
            }, 1000);
        });

        // 全局控制函数
        let scene;

        function toggleAnimation() {
            if (scene) {
                scene.toggleAnimation();
            }
        }

        function refreshData() {
            if (scene) {
                scene.refreshData();
            }
        }

        function changeView() {
            if (scene) {
                scene.changeView();
            }
        }
    </script>
</body>
</html>
