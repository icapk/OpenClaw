<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Portal</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(120deg,#eef4ff,#fdfefe); color:#1f2937; }
      .wrap { min-height: 100vh; display: grid; place-items: center; }
      .card { width:min(720px,92vw); background:#fff; border:1px solid #dbe3ef; border-radius:16px; padding:28px; box-shadow:0 10px 24px rgba(15,23,42,.08); }
      h1 { margin-top:0; }
      p { color:#4b5563; }
      .office-btn { display:inline-block; margin-top:14px; padding:12px 22px; background:#ffd54f; color:#1f2937; font-weight:700; border-radius:10px; text-decoration:none; border:2px solid #ffca28; }
      .office-btn:hover { background:#ffca28; }
      code { background:#f3f4f6; padding:2px 6px; border-radius:6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <h1>🧭 子Agent管理入口（Portal）</h1>
        <p>这是本地主入口页面。点击下方亮色按钮，进入“老板视角办公室看板”。</p>
        <a class="office-btn" href="/office">🏢 办公室</a>
        <p style="margin-top:18px;">跳转路径：<code>/office</code></p>
      </section>
    </div>
  </body>
</html>
